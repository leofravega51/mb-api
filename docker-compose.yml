services:
  postgres:
    image: postgres:16-alpine
    container_name: mb-api-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mybusiness
    volumes:
      - mb_api_pg_data:/var/lib/postgresql/data

volumes:
  mb_api_pg_data:
